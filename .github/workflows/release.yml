name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  release:
    if: github.event.head_commit.author.email != 'VladlenskiyReleaseBot@users.noreply.github.com'
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push the release commit + tag
      id-token: write       # OIDC for npm Trusted Publishing
    steps:
      - name: Generate GitHub App token
        id: generate_token
        uses: peter-murray/workflow-application-token-action@v2
        with:
          application_id: ${{ secrets.APP_ID }}
          application_private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}

      # Node 24 ships with npm 11+, which supports Trusted Publishing
      # (--provenance + OIDC). Avoids the npm self-update bug on Node 22.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Set git user
        run: |
          git config --global user.name "Vladlenskiy Release Bot"
          git config --global user.email "VladlenskiyReleaseBot@users.noreply.github.com"

      - run: yarn install --frozen-lockfile

      - name: Release
        run: yarn release --ci
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          # No NPM_TOKEN — Trusted Publishing exchanges the GH OIDC token for npm auth automatically.

      - name: Push changes with App token
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/vladlenskiy/react-native-tdlib.git HEAD:master --follow-tags
