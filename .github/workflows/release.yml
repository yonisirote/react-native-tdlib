name: Release

# Triggered by a version tag pushed by `npm run release` (which uses release-it).
# A maintainer can also fire this workflow manually from the Actions UI to
# re-publish an existing tag (recovery after a failed run).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v2.0.1). Defaults to the latest tag."
        required: false
        type: string
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the GitHub Release
      id-token: write       # OIDC for npm Trusted Publishing
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: yarn install --frozen-lockfile

      - run: npm test

      - name: Publish to npm (Trusted Publishing + provenance)
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.ref }}" \
            --title "${{ steps.tag.outputs.ref }}" \
            --generate-notes \
            --verify-tag
